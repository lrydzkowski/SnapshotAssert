name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Verify tag matches project version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PROJECT_VERSION=$(sed -n 's:.*<Version>\(.*\)</Version>.*:\1:p' src/SnapshotAssert/SnapshotAssert.csproj)
          if [ "$TAG_VERSION" != "$PROJECT_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match csproj version ($PROJECT_VERSION)"
            exit 1
          fi

      - name: Build
        run: dotnet build SnapshotAssert.slnx --configuration Release

      - name: Unit tests
        run: dotnet test SnapshotAssert.slnx --configuration Release --no-build

      - name: Pack
        run: dotnet pack src/SnapshotAssert/SnapshotAssert.csproj --configuration Release --no-build -o artifacts

      - name: Package consumer tests
        run: dotnet test tests/SnapshotAssert.PackageConsumer/SnapshotAssert.PackageConsumer.csproj --configuration Release

      - name: NuGet login (OIDC)
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to nuget.org
        run: dotnet nuget push artifacts/*.nupkg --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json
